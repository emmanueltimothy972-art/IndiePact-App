kind = "web"
previewPath = "/"
title = "IndiePact AI"
version = "1.0.0"
id = "artifacts/indiepact"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5174

[services.development]
run = "pnpm --filter @workspace/indiepact run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/indiepact", "run", "build" ]
publicDir = "artifacts/indiepact/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5174"
BASE_PATH = "/"
